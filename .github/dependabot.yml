version: 2
updates:
  - package-ecosystem: 'gradle'
    directory: '/app'
    schedule:
      interval: 'weekly'
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'npm'
    directory: '/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      # eslint-config-airbnb (legacy .eslintrc) does not support ESLint 9 flat config
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
