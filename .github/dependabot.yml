version: 2
updates:
  - package-ecosystem: 'gradle'
    directory: '/app'
    schedule:
      interval: 'weekly'
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'npm'
    directory: '/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      # airbnb-base uses legacy .eslintrc, which ESLint 10 dropped (eslintrc support removed).
      # Hold eslint at v8, the newest release eslint-config-airbnb-base supports.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['dependencies']
    commit-message:
      prefix: 'chore'
      include: 'scope'
